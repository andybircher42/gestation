# E2E Test: Complete onboarding flow
# Covers: privacy note → onboarding → main screen
appId: com.andybircher.induetime
---

# Wait for the app to load
- waitForAnimationToEnd

# Privacy note should appear on first launch
- assertVisible: "A quick note about privacy"
- tapOn: "Got it"

# Onboarding overlay
- assertVisible: "Expecting"
- assertVisible: "Delivered"
- assertVisible: "Calendar"
- tapOn: "Get started"

# Should land on the Expecting tab
- assertVisible: "in due time"
- assertVisible: "Expecting"
- assertVisible: "Track your first pregnancy"
